<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Biopunk Flipdot{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bio-green: #00ff41;
      --bio-dim: #00cc33;
      --bio-bg: #0a0a0a;
      --bio-card: #111;
    }
    body {
      font-family: 'Courier New', monospace;
      background: var(--bio-bg);
      color: var(--bio-green);
    }
    .navbar { border-bottom: 1px solid var(--bio-green); }
    .navbar-brand { color: var(--bio-green) !important; font-weight: bold; }
    .card { background: var(--bio-card); border-color: #222; }
    .form-control, .form-select {
      background: var(--bio-bg);
      border-color: var(--bio-green);
      color: var(--bio-green);
      font-family: inherit;
    }
    .form-control:focus, .form-select:focus {
      background: var(--bio-bg);
      border-color: var(--bio-dim);
      color: var(--bio-green);
      box-shadow: 0 0 0 0.2rem rgba(0, 255, 65, 0.25);
    }
    .btn-bio {
      background: var(--bio-green);
      color: #000;
      font-weight: bold;
      border: none;
    }
    .btn-bio:hover { background: var(--bio-dim); color: #000; }
    .btn-outline-bio {
      color: var(--bio-green);
      border-color: var(--bio-green);
      background: transparent;
    }
    .btn-outline-bio:hover { background: var(--bio-green); color: #000; }
    .table { color: var(--bio-green); --bs-table-bg: transparent; }
    .badge-source { font-size: 0.75rem; }
    footer { color: #555; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">&#9632; BIOPUNK FLIPDOT</a>
      <div class="d-flex gap-3 align-items-center">
        <a href="/workshop/submit" class="navbar-text small text-decoration-none" style="color: var(--bio-dim)">Workshop</a>
        <a href="/workshop/board" class="navbar-text small text-decoration-none" style="color: var(--bio-dim)">Board</a>
        <a href="/workshop/moderate" class="navbar-text small text-decoration-none" style="color: var(--bio-dim)">Mod</a>
        <span class="navbar-text small" id="queue-badge"></span>
      </div>
    </div>
  </nav>

  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'warning' if category == 'warning' else 'info' }} alert-dismissible fade show py-2" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}

    <footer class="mt-5 mb-3 text-center small">
      biopunk-display v1.0 &mdash; chapters 1-9, 12, 14-17
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
